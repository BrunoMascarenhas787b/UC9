<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão Fixo de WhatsApp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        .whatsapp-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            border-radius: 40%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 8px black;
            text-decoration: none;


        }

        .whatsapp-button img {
            width: 30px;
            height: 30px;



        }
    </style>
</head>

<body>

    <a href="https://wa.me/5599999999999" class="whatsapp-button" target="_blank">
        <img src="whatsapp.png" alt="WhatsApp">
    </a>

</body>

</html>
