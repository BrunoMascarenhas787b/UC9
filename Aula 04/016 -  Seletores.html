<!DOCTYPE html>
<html>
    
<head><!--Seletor de elementos se aplica nas Tags-->
    <style>
        p{color:purple;
        font-size: 20px;
        }

        .Titulo{
           color:aqua;
           text-align: center;
           font-family: 'Franklin Gothic Medium' , 'Arial Narrow', Arial, Helvetica, sans-serif;

        }
                          
        #Destaque{ /*Seletor de ID: Se aplica em todos os elementos
            que estiverem em destaque*/
            font-size: 35px;
            color: brown;
            font-weight: bold; /*negrito*/



        }
    </style>


</head>

<body> 
    <h1 class="título usando Classe</h1> 
    <p>Parágrafo usando Elemento</p>
    <p id="destaque">Parágrafo usando ID</p>
</body>
</html>
