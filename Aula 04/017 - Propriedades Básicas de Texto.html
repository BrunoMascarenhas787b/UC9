<!DOCTYPE html>
<html>
<head>
    <title>Propriedades Básicas</title>
     <style>
        .cor {
                color: Orange;
     }

        .fonte{
        font-family: 'Courier New' Courier, monospace;
     }
         .tamanho{
        font-size: 32px;
         }  
     </style>
     
    
</head>
<body>
 
    <!-- Aplicação da propriedade de cor -->
    <p class="cor">parágrafo tem a cor laranja.</p>
 
    <!-- Aplicação da propriedade de fonte -->
    <p class="fonte">Este parágrafo usa a fonte Courier New.</p>
 
    <!-- Aplicação da propriedade de tamanho -->
    <p class="tamanho">Este parágrafo tem um tamanho de fonte grande (32px).</p>
 
</body>
</html>
