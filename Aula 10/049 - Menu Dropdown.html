<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Dropdown Aprimorado</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif; /* Fonte do corpo */
            margin: 0; /* Remove margens padrão */
            background-color: #f0f0f0; /* Cor de fundo da página */
        }

        .dropbtn{
            background-color: #e9d57f;
            color: #5f5d5d;
            padding: 16px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s; 
        }

        .dropdown{
            position: relative;
            display: inline-block; /*Exibe em linha*/
        }

        .dropdown-content{
            display: none; /*Esconde o conteúdo por padrão*/
            position: absolute;
            background-color: #dae986;
            min-width: 160px; /*Largura mín. do conteúdo*/
            box-shadow: 0px 8px 16px 0px;
            z-index: 1; /*Garante que o conteúdo seja empilhado de elementos posicionados*/
        }

        .dropdown-content a{
            color: black;
            padding: 12px 16px; 
            text-decoration: none;
            display: block;
        }

        .dropdown-content a{
            background-color: antiquewhite;
        }

        .dropdown:hover  .dropdown-content{
            display: block;
        }

        .dropdown:hover .dropbtn{
            background-color: #a5975a;

        }
    </style>
</head>
<body>

    <div class="dropdown">
        <button class="dropbtn">MENU</button>
        <div class="dropdown-content">
            <a href="#">Sobre</a>
            <a href="#">Nosso Trabalho</a>
            <a href="#">Contatos</a>  
        </div>
    </div>

</body>
</html>
