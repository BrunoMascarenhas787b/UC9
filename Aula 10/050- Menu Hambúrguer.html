<!DOCTYPE html>
<html lang="pt-BR">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Hamburger</title>
    <style>
        /* Estilos globais */
        :root {
            --menu-bg-color: #b697d3;
            /* Cor do fundo do menu (blueviolet) */
            --menu-text-color: #000000;
            /* Cor do texto do menu */
            --link-hover-color: #ffffff;
            /* Cor de fundo ao passar o mouse */
        }
 
        body {
            font-family: 'Arial', sans-serif;
            /* Fonte mais moderna */
            margin: 0;
            background-color: #f0f0f0;
            line-height: 1.6;
            /* Melhora a legibilidade */
        }
 
        /*Estilização do menu*/
 
        .menu {
            background-color: var(--menu-bg-color);
            /*Usa a variável definida
            para a cor de fundo*/
            position: relative;
            /*Define como referência para o
            posicionamento absoluto dos links*/
            padding: 10px;
            /*Espaçamento interno do menu*/
        }
 
        .hamburger {
            display: none;
            /*Esconde o checkbox que será usado para controlar o menu*/
        }
 
        .hamburger-label {
            cursor: pointer;
            /*Indica que é clicável*/
            font-size: 24px;
            color: var(--menu-text-color);
            /*Usa a variável de cor do texto*/
            padding: 16px;
            transition: opacity 0.3s;
            /*Transição suave ao mudar a opacidade*/
        }
 
        .nav-links {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 100%;
            left: 0;
            width: 50%;
            background-color: var(--menu-bg-color);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            /*Sombra suave para dar profundidade*/
            transition: opacity 0.3s, transform 0.3s;
            opacity: 0;
            transform: translateY(-10px);
            /*Levemente deslocado para cima*/
        }
 
        .nav-links a {
            padding: 12px 16px;
            text-decoration: none;
            color: var(--menu-text-color);
            text-align: center;
            transition: background-color 0.3s;
        }
 
        .nav-links a:hover {
            background-color: var(--link-hover-color);
            color: var(--menu-bg-color);
        }
 
        /*Mostra os links quando o checkbox está marcado*/
        .hamburger:checked+.hamburger-label+.nav-links {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }
 
        /* Celulares */
        @media (max-width: 600px) {
            .menu {
                padding: 0;
            }
 
            .hamburger-label {
                display: block;
                padding: 16px;
            }
 
            .nav-links {
                width: 100%;
                position: static;
            }
 
            .nav-links a {
                text-align: left;
                padding: 14px 20px;
            }
        }
 
       
    </style>
</head>
 
<body>
    <nav class="menu">
        <input type="checkbox" id="hamburger" class="hamburger">
        <label for="hamburger" class="hamburger-label">☰</label>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#news">Notícias</a>
            <a href="#contact">Contatos</a>
            <a href="#about">Sobre</a>
        </div>
    </nav>
</body>
 
</html>
