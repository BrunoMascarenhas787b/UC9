<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posicionamento de Texto</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
    font-family: 'Franklin Gothic Medium' , 'Arial Narrow'
    display: flex;
    flex-direction: column;
    height: 100vh;
    background-color: Bisque;
  }
    
.content{
  flex: 1;
  padding: 30px 20px;
}
h1{
  text-align: center;
  margin-bottom: 20px;
  color: #680808;
}

.Left-Text{
  text-align: center;
  background-color: lightseagreen;
  padding: 15px;
  margin-bottom: 20px;
}
.Right-Text{
text-align: center;
background-color: aqua;
padding: 15px;
margin-bottom: 20px;
}
.top-text{
background-color: #680808;
color: aliceblue;
padding: 15px;
margin-bottom: 20px;

}
.side-by-side{
display: flex;
flex-wrap: wrap;
gap: 20px;
margin-bottom: 20px;
}

.text-box{
flex: 1 1 45%;
background-color: #8c98a0;
padding: 15px;
}

.bottom-text{
background-color: orange;
text-align: center;
padding: 15px;
}
 </style>
</head>
<body>
    

  <!-- Conteúdo principal -->
  <div class="content">
    <h1>Exemplos de Posicionamento de Texto</h1>


    <!-- Alinhamento à esquerda -->
    <div class="left-text">
      Este texto está alinhado à esquerda.
    </div>

    <!-- Alinhamento à direita -->
    <div class="right-text">
      Este texto está alinhado à direita.
    </div>

    <!-- Texto ilustrativo no "topo" (posição relativa ao fluxo) -->
    <div class="top-text">
      Este texto está no topo da seção.
    </div>

    <!-- Textos lado a lado (flexível e responsivo) -->
    <div class="side-by-side">
      <div class="text-box">
        Texto 1 lado a lado.
      </div>
      <div class="text-box">
        Texto 2 lado a lado.
      </div>
    </div>
  </div>

  <!-- Rodapé fixado no fim da página -->
  <div class="bottom-text">
    Este texto está no rodapé da página.
  </div>

</body>
</html>
