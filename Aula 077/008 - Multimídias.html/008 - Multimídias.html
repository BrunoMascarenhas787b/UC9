<!DOCTYPE html>
<html lang="pt-br">
</html>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimidia</title>
</head>
<body>
      <h1> Inserindo áudio, imagem e video</h1>
      <!--inserindo imagem-->
      <img src="Imagem1.jpg" alt="html" width="100" height="80">
      <img src="Imagem2.jpg" alt="css" width="100" height="80">
      <img src="Imagem3.jpg" alt="JavaScript" width="100" height="80">
    <br>
        <!-- Inserindo video-->
        <video poster="video.png" width="200" height="200" controls Loop muted>
            <source src="video.mp4" type=""video/mp4">
        </video>
    <br>
<!-- Inserindo audio-->
<audio controls Loops>
       <source src=""audio.mp3" type=""audio/mpeg">

</audio>

</body>
</html>
